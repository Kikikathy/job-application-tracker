<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" fill="url(#grad1)"/>
  
  <!-- Briefcase icon -->
  <g transform="translate(24, 32)">
    <!-- Main briefcase body -->
    <rect x="4" y="20" width="72" height="52" rx="6" fill="white" opacity="0.95"/>
    
    <!-- Briefcase handle -->
    <path d="M 28 20 L 28 12 C 28 8 32 4 40 4 C 48 4 52 8 52 12 L 52 20" 
          stroke="white" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.95"/>
    
    <!-- Briefcase lock/clasp -->
    <rect x="36" y="40" width="8" height="16" rx="2" fill="#667eea"/>
    
    <!-- Document icon inside -->
    <g opacity="0.3">
      <rect x="16" y="28" width="20" height="24" rx="2" fill="#667eea"/>
      <line x1="20" y1="34" x2="32" y2="34" stroke="white" stroke-width="2"/>
      <line x1="20" y1="40" x2="32" y2="40" stroke="white" stroke-width="2"/>
      <line x1="20" y1="46" x2="28" y2="46" stroke="white" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Checkmark badge -->
  <circle cx="96" cy="32" r="18" fill="#10b981"/>
  <path d="M 88 32 L 94 38 L 104 26" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

