<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f9fafb;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 13px;
      opacity: 0.9;
    }

    .container {
      padding: 20px;
    }

    .status-message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .status-message.info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }

    .status-message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      border: 3px solid #f3f4f6;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .auth-section {
      text-align: center;
      padding: 20px;
    }

    .auth-section p {
      color: #6b7280;
      margin-bottom: 16px;
    }

    .link-button {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .link-button:hover {
      text-decoration: underline;
    }

    .detected-info {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .detected-info strong {
      display: block;
      color: #374151;
      margin-bottom: 4px;
    }

    .detected-info span {
      color: #6b7280;
    }

    .icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .hidden {
      display: none;
    }

    .document-upload-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .document-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
    }

    .file-label svg {
      color: #667eea;
    }

    .file-input {
      display: none;
    }

    .file-name {
      font-size: 12px;
      color: #6b7280;
      padding: 8px 12px;
      background: #f3f4f6;
      border-radius: 4px;
      border: 1px dashed #d1d5db;
      cursor: pointer;
      transition: all 0.2s;
    }

    .file-name:hover {
      border-color: #667eea;
      background: #f9fafb;
    }

    .file-name.has-file {
      color: #059669;
      border-color: #10b981;
      background: #d1fae5;
      border-style: solid;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 Job Application Tracker</h1>
    <p>Track your job applications effortlessly</p>
  </div>

  <div class="container">
    <!-- Loading State -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>

    <!-- Authentication Required -->
    <div id="auth-required" class="hidden">
      <div class="auth-section">
        <svg class="icon" style="width: 48px; height: 48px; margin: 0 auto 16px; color: #9ca3af;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        <p>Please sign in to your Job Tracker account to save applications.</p>
        <a href="#" id="open-dashboard" class="link-button">Open Dashboard →</a>
      </div>
    </div>

    <!-- Main Form -->
    <div id="main-form" class="hidden">
      <div id="status-message"></div>

      <div id="detected-info" class="detected-info hidden">
        <strong>✓ Job Details Detected</strong>
        <span>Review and edit the information below before saving.</span>
      </div>

      <form id="application-form">
        <div class="form-group">
          <label for="company_name">Company Name *</label>
          <input type="text" id="company_name" name="company_name" required placeholder="e.g., Google">
        </div>

        <div class="form-group">
          <label for="position_title">Position Title *</label>
          <input type="text" id="position_title" name="position_title" required placeholder="e.g., Software Engineer">
        </div>

        <div class="form-group">
          <label for="application_date">Application Date *</label>
          <input type="date" id="application_date" name="application_date" required>
        </div>

        <div class="form-group">
          <label for="application_method">Application Method</label>
          <input type="text" id="application_method" name="application_method" placeholder="e.g., LinkedIn, Company Website">
        </div>

        <div class="form-group">
          <label for="job_posting_url">Job Posting URL</label>
          <input type="url" id="job_posting_url" name="job_posting_url" placeholder="https://...">
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" placeholder="Add any additional notes..."></textarea>
        </div>

        <div class="form-group">
          <label>Documents (Optional)</label>
          <div class="document-upload-section">
            <div class="document-item">
              <label for="resume" class="file-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                Resume/CV
              </label>
              <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" class="file-input">
              <span class="file-name" id="resume-name">No file chosen</span>
            </div>

            <div class="document-item">
              <label for="cover_letter" class="file-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                Cover Letter
              </label>
              <input type="file" id="cover_letter" name="cover_letter" accept=".pdf,.doc,.docx" class="file-input">
              <span class="file-name" id="cover_letter-name">No file chosen</span>
            </div>

            <div class="document-item">
              <label for="portfolio" class="file-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                Portfolio/Other
              </label>
              <input type="file" id="portfolio" name="portfolio" accept=".pdf,.doc,.docx" class="file-input">
              <span class="file-name" id="portfolio-name">No file chosen</span>
            </div>
          </div>
        </div>

        <div class="button-group">
          <button type="submit" class="btn-primary" id="save-btn">
            Save Application
          </button>
          <button type="button" class="btn-secondary" id="clear-btn">
            Clear
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
